<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Physics Portfolio</title>
    <style>
        /* Reset margins and hide scrollbars for a full-screen canvas */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #121212; /* Dark mode background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white; 
        }
        
        canvas { 
            display: block; 
        }

        /* Styling for the text overlay */
        #ui-layer {
            position: absolute;
            top: 30px;
            left: 40px;
            pointer-events: none; /* Lets clicks pass through to the canvas */
        }
        #ui-layer h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #ff007f, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #ui-layer p {
            font-size: 1.2rem;
            color: #888;
            margin: 0;
        }

        /* Styling for the popup modal */
        #info-modal {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Frosted glass effect */
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        #info-modal.active {
            opacity: 1;
            transform: translateY(0);
        }
        #modal-title { margin-top: 0; font-size: 1.8rem; }
        #modal-category { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.7;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>Creative Sandbox</h1>
        <p>Throw the shapes around. Click to view project details.</p>
    </div>

    <div id="info-modal">
        <div id="modal-category">Category</div>
        <h2 id="modal-title">Project Title</h2>
        <p id="modal-desc">Project Description goes here.</p>
    </div>

    <script>
        // 1. Setup Matter.js Aliases
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Events = Matter.Events;

        // 2. Initialize Engine and World
        const engine = Engine.create();
        const world = engine.world;

        // 3. Create the Canvas Renderer
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false, // Must be false to see solid colors
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // 4. Portfolio Data Collection
        const portfolioData = [
            { title: 'Neon Cyberpunk UI', category: 'Digital', desc: 'A futuristic interface design for a gaming client.', color: '#FF0055', shape: 'rectangle' },
            { title: 'Eco Packaging', category: 'Print', desc: 'Sustainable cardboard packaging concept for organic goods.', color: '#00FFAA', shape: 'circle' },
            { title: 'Abstract Festival', category: 'Print', desc: 'Vibrant typography and shapes for a music festival.', color: '#7700FF', shape: 'polygon' },
            { title: 'Minimalist Branding', category: 'Identity', desc: 'Clean, modern identity system for a tech startup.', color: '#00DDFF', shape: 'rectangle' },
            { title: 'Retro App Icon', category: 'Digital', desc: 'Skeuomorphic icon design inspired by the 90s.', color: '#FFDD00', shape: 'circle' },
            { title: 'Skate Deck Series', category: 'Illustration', desc: 'Edgy, hand-drawn vector art for a skate brand.', color: '#FF5500', shape: 'polygon' }
        ];

        const shapes = [];

        // 5. Generate Physics Bodies for each Project
        portfolioData.forEach((project) => {
            const startX = Math.random() * (window.innerWidth - 400) + 200;
            const startY = Math.random() * -800 - 200; // Drop them from off-screen top
            const size = 60 + Math.random() * 40; // Randomize size slightly
            
            let body;
            const options = { 
                restitution: 0.7, // Bounciness
                friction: 0.1,
                render: { fillStyle: project.color } 
            };

            if (project.shape === 'circle') {
                body = Bodies.circle(startX, startY, size, options);
            } else if (project.shape === 'polygon') {
                body = Bodies.polygon(startX, startY, 6, size, options); // Hexagon
            } else {
                body = Bodies.rectangle(startX, startY, size * 1.5, size * 1.5, options); // Square
            }
            
            // Attach our custom project data to the physics body so we can retrieve it on click
            body.portfolioInfo = project;
            shapes.push(body);
        });

        // 6. Create Boundaries (Floor and Walls)
        const thickness = 200;
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + (thickness / 2), window.innerWidth * 2, thickness, { isStatic: true });
        const leftWall = Bodies.rectangle(-thickness/2, window.innerHeight / 2, thickness, window.innerHeight * 2, { isStatic: true });
        const rightWall = Bodies.rectangle(window.innerWidth + (thickness/2), window.innerHeight / 2, thickness, window.innerHeight * 2, { isStatic: true });

        // Add everything to the physics world
        Composite.add(world, [...shapes, ground, leftWall, rightWall]);

        // 7. Add Mouse Interaction (Drag & Drop)
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false } // Hide the line connecting the mouse to the shape
            }
        });

        Composite.add(world, mouseConstraint);
        render.mouse = mouse; // Keeps mouse in sync with canvas

        // 8. Handle Clicks to show Project Info
        const modal = document.getElementById('info-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalCategory = document.getElementById('modal-category');
        const modalDesc = document.getElementById('modal-desc');

        Events.on(mouseConstraint, 'mousedown', function(event) {
            // Find what body the mouse is currently over
            const clickedBodies = Matter.Query.point(shapes, event.mouse.position);

            if (clickedBodies.length > 0) {
                // Get the data we attached to the body earlier
                const data = clickedBodies[0].portfolioInfo;
                
                // Update HTML
                modalTitle.innerText = data.title;
                modalTitle.style.color = data.color;
                modalCategory.innerText = data.category;
                modalDesc.innerText = data.desc;
                
                // Show Modal
                modal.classList.add('active');
            } else {
                // If they clicked the background, hide the modal
                modal.classList.remove('active');
            }
        });

        // 9. Keep everything responsive if the browser is resized
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            
            // Move boundaries to new positions
            Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + (thickness / 2) });
            Matter.Body.setPosition(rightWall, { x: window.innerWidth + (thickness / 2), y: window.innerHeight / 2 });
        });
    </script>
</body>
</html>
