<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOID-ZERO | DEEP SPACE ENGINE v2</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

canvas { display: block; }

#overlay {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #00ffcc;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    text-shadow: 2px 2px 4px #000;
}

.hud-bar {
    width: 200px;
    height: 10px;
    border: 1px solid #00ffcc;
    margin: 5px 0;
}

#hp-fill { height: 100%; background: #ff0044; width: 100%; }
#en-fill { height: 100%; background: #00ccff; width: 100%; }

#score { margin-top: 10px; }

#minimap {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 150px;
    height: 150px;
    border: 1px solid #00ffcc;
    background: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div id="overlay">
    <div>SYSTEM: ACTIVE</div>
    <div>HULL:<div class="hud-bar"><div id="hp-fill"></div></div></div>
    <div>ENERGY:<div class="hud-bar"><div id="en-fill"></div></div></div>
    <div id="score">SCORE: 0</div>
</div>

<canvas id="ctx"></canvas>
<canvas id="minimap"></canvas>

<script>
const PI = Math.PI;
const TWO_PI = PI * 2;

const random = (a,b)=>Math.random()*(b-a)+a;

class Vec2 {
    constructor(x=0,y=0){this.x=x;this.y=y;}
    add(v){this.x+=v.x;this.y+=v.y;return this;}
    sub(v){this.x-=v.x;this.y-=v.y;return this;}
    mult(s){this.x*=s;this.y*=s;return this;}
    clone(){return new Vec2(this.x,this.y);}
    mag(){return Math.hypot(this.x,this.y);}
    normalize(){let m=this.mag(); if(m) this.mult(1/m); return this;}
    dist(v){return Math.hypot(this.x-v.x,this.y-v.y);}
    static fromAngle(a){return new Vec2(Math.cos(a),Math.sin(a));}
}

/* ================= STARFIELD ================= */
class Star {
    constructor(){
        this.pos = new Vec2(random(0,4000), random(0,4000));
        this.size = random(0.5,2);
    }
    draw(ctx){
        ctx.fillStyle="#fff";
        ctx.fillRect(this.pos.x,this.pos.y,this.size,this.size);
    }
}

/* ================= PARTICLES ================= */
class Particle {
    constructor(x,y){
        this.pos=new Vec2(x,y);
        this.vel=Vec2.fromAngle(random(0,TWO_PI)).mult(random(1,3));
        this.life=40;
    }
    update(){
        this.pos.add(this.vel);
        this.life--;
    }
    draw(ctx){
        ctx.globalAlpha=this.life/40;
        ctx.fillStyle="#ff4444";
        ctx.fillRect(this.pos.x,this.pos.y,2,2);
        ctx.globalAlpha=1;
    }
}

/* ================= ENTITY ================= */
class Entity {
    constructor(x,y,r){
        this.pos=new Vec2(x,y);
        this.vel=new Vec2();
        this.acc=new Vec2();
        this.angle=0;
        this.radius=r;
        this.hp=100;
        this.dead=false;
    }
    applyForce(f){ this.acc.add(f); }
    update(){
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.vel.mult(0.99);
    }
}

/* ================= PROJECTILE ================= */
class Bullet extends Entity {
    constructor(x,y,a){
        super(x,y,2);
        this.vel=Vec2.fromAngle(a).mult(10);
        this.life=100;
    }
    update(){
        super.update();
        this.life--;
        if(this.life<=0) this.dead=true;
    }
    draw(ctx){
        ctx.strokeStyle="#00ffcc";
        ctx.beginPath();
        ctx.moveTo(this.pos.x,this.pos.y);
        ctx.lineTo(this.pos.x-this.vel.x,this.pos.y-this.vel.y);
        ctx.stroke();
    }
}

/* ================= SHIP ================= */
class Ship extends Entity {
    constructor(x,y,color){
        super(x,y,15);
        this.color=color;
        this.energy=100;
        this.cooldown=0;
    }
    fire(arr){
        if(this.cooldown<=0 && this.energy>5){
            arr.push(new Bullet(this.pos.x,this.pos.y,this.angle));
            this.cooldown=10;
            this.energy-=5;
        }
    }
    draw(ctx){
        ctx.save();
        ctx.translate(this.pos.x,this.pos.y);
        ctx.rotate(this.angle);
        ctx.strokeStyle=this.color;
        ctx.beginPath();
        ctx.moveTo(15,0);
        ctx.lineTo(-10,-10);
        ctx.lineTo(-5,0);
        ctx.lineTo(-10,10);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }
}

/* ================= ENEMY ================= */
class Enemy extends Ship {
    constructor(x,y){
        super(x,y,"#ff4444");
    }
    update(player){
        let d=this.pos.dist(player.pos);
        this.angle=Math.atan2(player.pos.y-this.pos.y, player.pos.x-this.pos.x);
        this.applyForce(Vec2.fromAngle(this.angle).mult(0.15));

        if(d<250) this.fire(game.bullets);

        super.update();
    }
}

/* ================= GAME ================= */
const game = {
    canvas:document.getElementById("ctx"),
    ctx:null,
    mini:document.getElementById("minimap"),
    mctx:null,

    player:null,
    bullets:[],
    enemies:[],
    particles:[],
    stars:[],
    keys:{},

    score:0,
    shake:0,
    camera:new Vec2(),

    init(){
        this.ctx=this.canvas.getContext("2d");
        this.mctx=this.mini.getContext("2d");

        this.resize();
        window.addEventListener("resize",()=>this.resize());

        this.player=new Ship(2000,2000,"#00ffcc");

        for(let i=0;i<200;i++) this.stars.push(new Star());

        setInterval(()=>this.spawnEnemy(),1500);

        window.addEventListener("keydown",e=>this.keys[e.code]=true);
        window.addEventListener("keyup",e=>this.keys[e.code]=false);

        this.loop();
    },

    spawnEnemy(){
        let x=random(0,4000);
        let y=random(0,4000);
        this.enemies.push(new Enemy(x,y));
    },

    resize(){
        this.canvas.width=innerWidth;
        this.canvas.height=innerHeight;
    },

    input(){
        let p=this.player;

        if(this.keys["KeyA"]) p.angle-=0.07;
        if(this.keys["KeyD"]) p.angle+=0.07;

        if(this.keys["KeyW"]){
            p.applyForce(Vec2.fromAngle(p.angle).mult(0.4));
        }

        if(this.keys["Space"]) p.fire(this.bullets);
    },

    update(){
        this.input();

        this.player.update();
        if(this.player.cooldown>0) this.player.cooldown--;
        if(this.player.energy<100) this.player.energy+=0.2;

        this.enemies.forEach(e=>e.update(this.player));
        this.bullets.forEach(b=>b.update());
        this.particles.forEach(p=>p.update());

        /* collisions */
        this.bullets.forEach(b=>{
            this.enemies.forEach(e=>{
                if(!b.dead && !e.dead && b.pos.dist(e.pos)<e.radius){
                    e.hp-=30;
                    b.dead=true;

                    for(let i=0;i<10;i++)
                        this.particles.push(new Particle(e.pos.x,e.pos.y));

                    this.shake=10;

                    if(e.hp<=0){
                        e.dead=true;
                        this.score+=100;
                    }
                }
            });
        });

        this.enemies=this.enemies.filter(e=>!e.dead);
        this.bullets=this.bullets.filter(b=>!b.dead);
        this.particles=this.particles.filter(p=>p.life>0);

        this.camera.x=this.player.pos.x-this.canvas.width/2;
        this.camera.y=this.player.pos.y-this.canvas.height/2;

        document.getElementById("score").innerText="SCORE: "+this.score;
        document.getElementById("hp-fill").style.width=this.player.hp+"%";
        document.getElementById("en-fill").style.width=this.player.energy+"%";
    },

    draw(){
        let c=this.ctx;

        c.fillStyle="#000";
        c.fillRect(0,0,this.canvas.width,this.canvas.height);

        c.save();

        /* screen shake */
        if(this.shake>0){
            c.translate(random(-this.shake,this.shake), random(-this.shake,this.shake));
            this.shake*=0.9;
        }

        c.translate(-this.camera.x,-this.camera.y);

        this.stars.forEach(s=>s.draw(c));
        this.particles.forEach(p=>p.draw(c));
        this.bullets.forEach(b=>b.draw(c));
        this.enemies.forEach(e=>e.draw(c));
        this.player.draw(c);

        c.restore();

        this.drawMinimap();
    },

    drawMinimap(){
        let m=this.mctx;
        m.clearRect(0,0,150,150);

        m.fillStyle="#0ff";
        m.fillRect(75,75,3,3);

        this.enemies.forEach(e=>{
            let dx=(e.pos.x-this.player.pos.x)/50;
            let dy=(e.pos.y-this.player.pos.y)/50;
            m.fillStyle="#f44";
            m.fillRect(75+dx,75+dy,2,2);
        });
    },

    loop(){
        this.update();
        this.draw();
        requestAnimationFrame(()=>this.loop());
    }
};

game.init();
</script>
</body>
</html>
