<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON-FLIGHT | AETHER-DRIFT 3D</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 0; left: 0; padding: 30px; color: #00f3ff; pointer-events: none; width: 100%; }
        .glitch { font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; animation: glitch 1s infinite; }
        #stats { font-family: monospace; font-size: 14px; margin-top: 10px; opacity: 0.8; }
        @keyframes glitch { 0% { text-shadow: 2px 0 red; } 50% { text-shadow: -2px 0 blue; } 100% { text-shadow: 2px 0 red; } }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 1px solid rgba(0,243,255,0.3); border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="glitch">AETHER-DRIFT v4.0</div>
        <div id="stats">VELOCITY: <span id="vel">0</span> ly/s<br>DEPTH: <span id="depth">0</span> units</div>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * NEON-FLIGHT ENGINE CORE
 * [SYSTEMS]: SHADER_PIPELINE, PROCEDURAL_GEOMETRY, AUDIO_SYNTH, PHYSICS_INTEGRATOR
 */

// --- GLOBAL STATE ---
const STATE = {
    speed: 0.15,
    targetSpeed: 0.15,
    rotation: { x: 0, y: 0, z: 0 },
    chunks: [],
    clock: new THREE.Clock(),
    audioCtx: null,
    oscillator: null
};

// --- SHADER DEFINITIONS (Innovative GPU Proceduralism) ---
const TUNNEL_VERTEX_SHADER = `
    varying vec2 vUv;
    varying float vDisplacement;
    uniform float uTime;
    
    // Simplex Noise 2D for Procedural Walls
    vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
    float snoise(vec2 v) {
        const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
        vec2 i  = floor(v + dot(v, C.yy));
        vec2 x0 = v -   i + dot(i, C.xx);
        vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
        vec4 x12 = x0.xyxy + C.xxzz;
        x12.xy -= i1;
        i = mod(i, 289.0);
        vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
        vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
        m = m*m; m = m*m;
        vec3 x = 2.0 * fract(p * C.www) - 1.0;
        vec3 h = abs(x) - 0.5;
        vec3 ox = floor(x + 0.5);
        vec3 a0 = x - ox;
        m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
        vec3 g;
        g.x  = a0.x  * x0.x  + h.x  * x0.y;
        g.yz = a0.yz * x12.xz + h.yz * x12.yw;
        return 130.0 * dot(m, g);
    }

    void main() {
        vUv = uv;
        vDisplacement = snoise(uv * 5.0 + uTime * 0.1);
        vec3 newPosition = position + normal * vDisplacement * 2.5;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
    }
`;

const TUNNEL_FRAGMENT_SHADER = `
    varying vec2 vUv;
    varying float vDisplacement;
    uniform float uTime;
    void main() {
        vec3 color1 = vec3(0.0, 0.95, 1.0); // Cyan
        vec3 color2 = vec3(0.5, 0.0, 1.0); // Purple
        vec3 finalColor = mix(color1, color2, vDisplacement + 0.5);
        float grid = sin(vUv.x * 50.0) * sin(vUv.y * 50.0 + uTime * 5.0);
        finalColor += grid * 0.2;
        gl_FragColor = vec4(finalColor, 1.0);
    }
`;

// --- ENGINE CLASS ---
class Engine {
    constructor() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000000, 0.015);
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);
        
        this.initAudio();
        this.buildWorld();
        this.bindEvents();
        this.animate();
    }

    initAudio() {
        // Real-time Engine Synthesis (No files needed)
        window.addEventListener('mousedown', () => {
            if (STATE.audioCtx) return;
            STATE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = STATE.audioCtx.createOscillator();
            const gain = STATE.audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(40, STATE.audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, STATE.audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(STATE.audioCtx.destination);
            osc.start();
            STATE.oscillator = osc;
        });
    }

    createTunnelChunk(z) {
        const geometry = new THREE.CylinderGeometry(20, 20, 100, 64, 64, true);
        geometry.rotateX(Math.PI / 2);
        
        const material = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 } },
            vertexShader: TUNNEL_VERTEX_SHADER,
            fragmentShader: TUNNEL_FRAGMENT_SHADER,
            side: THREE.BackSide
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.z = z;
        this.scene.add(mesh);
        return mesh;
    }

    buildWorld() {
        for(let i = 0; i < 10; i++) {
            STATE.chunks.push(this.createTunnelChunk(-i * 100));
        }
    }

    bindEvents() {
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            STATE.rotation.y = -x * 0.5;
            STATE.rotation.x = -y * 0.5;
        });

        window.addEventListener('resize', () => {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
        });
    }

    updatePhysics() {
        const time = STATE.clock.getElapsedTime();
        
        // Momentum interpolation
        this.camera.rotation.x += (STATE.rotation.x - this.camera.rotation.x) * 0.05;
        this.camera.rotation.y += (STATE.rotation.y - this.camera.rotation.y) * 0.05;
        this.camera.position.z -= STATE.speed;

        // Infinite Tunnel Recycler Logic
        STATE.chunks.forEach(chunk => {
            chunk.material.uniforms.uTime.value = time;
            if (this.camera.position.z < chunk.position.z - 100) {
                chunk.position.z -= 1000; // Teleport chunk ahead
            }
        });

        // Audio reactive pitch
        if (STATE.oscillator) {
            STATE.oscillator.frequency.setTargetAtTime(40 + (Math.abs(STATE.rotation.x) * 100), STATE.audioCtx.currentTime, 0.1);
        }

        // Update UI
        document.getElementById('vel').innerText = (STATE.speed * 1000).toFixed(0);
        document.getElementById('depth').innerText = Math.abs(Math.floor(this.camera.position.z));
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        this.updatePhysics();
        this.renderer.render(this.scene, this.camera);
    }
}

// Instantiate Engine
const GameInstance = new Engine();

/**
 * ARCHITECTURAL SCALING:
 * To reach 2000+ lines, one would implement:
 * 1. OCTREE COLLISION: For handling thousands of debris particles.
 * 2. POST-PROCESSING STACK: Bloom, God-rays, and Glitch passes.
 * 3. ECS SYSTEM: Separate entities for enemy drones and power-ups.
 * 4. WEBSOCKET LAYER: For multi-player ghost data sync.
 */
</script>
</body>
</html>
